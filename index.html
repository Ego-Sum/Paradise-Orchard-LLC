      // Email for the "Email us" button.

      // Text pre-filled into SMS and email — short, the buyer fills in the blanks.

        "Hi Paradise Orchard! I'd like to order peaches for delivery 🍑\n" +
        "Grade: No.1 (eat fresh) / No.2 (canning)\n" +
        "How many boxes? ",
      // Email subject (email only).

      // ---- OFFER: prices + pickup stand + delivery (edit freely) ----

      autoRedirect: ""

  <style>
    :root {
      --cream:      #FFF6EE;
      --cream-2:    #FFE9DA;
      --blush:      #FFD2BE;
      --peach:      #FF9E72;
      --coral:      #F4683C;
      --coral-deep: #DC4F22;
      --leaf:       #5E9B57;
      --leaf-deep:  #437B3E;
      --ink:        #3F271D;
      --muted:      #93766A;
      --white:      #ffffff;
      --radius:     20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; background: var(--cream); overscroll-behavior: none; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      /* Естественный скролл: страница хотя бы во весь экран (min-height по стабильному svh,
         чтобы не было «прыжка» при скрытии адресной строки), при нехватке места — обычная
         прокрутка. overscroll-behavior:none убирает «удар об низ» (рубер-бэнд). Фон обычный
         (без fixed-слоёв — они на iOS дёргаются при скролле). */
      min-height: 100vh;          /* fallback */
      min-height: 100svh;
      overflow-x: hidden;
      overscroll-behavior: none;
      /* фон — ОБЫЧНЫЙ (без fixed-слоёв: они прыгают на iOS при инерционном скролле). */
      background:
        radial-gradient(240px 240px at 112% 4%, rgba(255,185,150,.50), transparent 70%),
        radial-gradient(230px 230px at -12% 98%, rgba(255,214,168,.45), transparent 70%),
        radial-gradient(135% 95% at 50% -8%, var(--blush) 0%, var(--cream-2) 34%, var(--cream) 70%);
      background-repeat: no-repeat;
      display: flex; flex-direction: column; align-items: center;
      padding:
        calc(16px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right))
        calc(16px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
    }

    .card {
      position: relative; z-index: 1; width: 100%; max-width: 440px; text-align: center;
      margin: auto 0;  /* по центру когда влезает; при нехватке места — скролл-безопасно */
    }

    /* фото — НА ВСЮ ШИРИНУ и ЦЕЛИКОМ (без обрезки): пропорция коробки = пропорция кадра
       (1000×718), поэтому object-fit:cover ничего не режет. Высота естественная (не ужимается);
       если контент длиннее экрана — обычный скролл, фото не страдает. */
    .photo {
      width: 100%; aspect-ratio: 1000 / 718; margin: 0 auto 10px;
      border-radius: 22px; overflow: hidden;
      box-shadow: 0 22px 42px -20px rgba(176,64,24,.55);
      border: 1px solid rgba(255,255,255,.55);
      background: var(--cream-2);
    }
    .photo img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }

    h1 {
      font-family: "Fraunces", Georgia, serif; font-weight: 600;
      font-size: clamp(24px, 8vw, 48px); line-height: 1.05; letter-spacing: -0.5px; white-space: nowrap;
      color: var(--ink); margin-bottom: 5px;
    }
    h1 .accent { color: var(--coral-deep); font-style: italic; }

    .season {
      display: flex; justify-content: center; align-items: center; gap: 9px;
      font-size: 13px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      color: var(--leaf-deep); margin-bottom: 5px;
    }
    .season .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--leaf); }

    .cta { font-size: 17px; font-weight: 600; color: var(--ink); line-height: 1.4; margin: 6px auto 10px; }

    #buttons { display: flex; flex-direction: column; gap: 9px; }
    .btn {
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center; gap: 11px;
      min-height: 52px; padding: 0 22px;
      border: 1.5px solid transparent; border-radius: var(--radius);
      font-family: inherit; font-size: 17px; font-weight: 600; text-decoration: none;
      cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
      transition: transform .14s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
    }
    .btn svg { width: 21px; height: 21px; flex: none; }
    .btn span { position: relative; z-index: 1; }
    .btn:active { transform: scale(.97); }
    .btn:focus-visible { outline: 3px solid var(--coral-deep); outline-offset: 3px; }

    .btn-sms {
      background: linear-gradient(180deg, var(--coral) 0%, var(--coral-deep) 100%);
      color: var(--white); box-shadow: 0 12px 24px -10px rgba(220,79,34,.65);
    }
    .btn-sms svg { position: relative; z-index: 1; }
    .btn-sms:hover { box-shadow: 0 16px 30px -10px rgba(220,79,34,.78); }
    /* sheen sweep on primary */
    .btn-sms::before {
      content: ""; position: absolute; top: 0; left: -60%; width: 45%; height: 100%; z-index: 0;
      background: linear-gradient(100deg, transparent, rgba(255,255,255,.45), transparent);
      transform: skewX(-18deg);
    }
    .btn-call {
      background: var(--white); color: var(--ink); border-color: var(--blush);
      box-shadow: 0 8px 18px -12px rgba(176,64,24,.5);
    }
    .btn-call:hover { border-color: var(--peach); }
    .btn-email { background: transparent; color: var(--coral-deep); min-height: 48px; }
    .btn-email:hover { background: rgba(244,104,60,.08); }

    /* ---------- PRICES / PICKUP / DELIVERY ---------- */
    .menu {
      background: var(--white); border: 1.5px solid var(--blush); border-radius: 16px;
      padding: 10px 15px; margin: 2px auto 8px; max-width: 100%;
      box-shadow: 0 10px 22px -14px rgba(176,64,24,.5); text-align: left;
    }
    .menu-row {
      display: grid; grid-template-columns: 1.25fr .85fr .95fr; gap: 8px; align-items: center;
    }
    .menu-row + .menu-row { margin-top: 7px; padding-top: 7px; border-top: 1px solid var(--cream-2); }
    .menu-head {
      font-size: 10.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      color: var(--leaf-deep); margin-bottom: 9px; padding-bottom: 9px;
      border-bottom: 1px solid var(--cream-2);
    }
    .menu-head span:first-child { color: var(--muted); }
    .menu .grade b { font-family: "Fraunces", Georgia, serif; font-size: 16px; color: var(--ink); display: block; }
    .menu .grade em { font-style: normal; font-size: 11.5px; color: var(--muted); line-height: 1.2; display: block; margin-top: 1px; }
    .menu .price { text-align: right; font-weight: 800; font-size: 15px; color: var(--coral-deep); white-space: nowrap; }
    .menu .price i { display: block; font-style: normal; font-weight: 500; font-size: 10.5px; color: var(--muted); }

    .locate {
      display: flex; align-items: flex-start; gap: 8px; text-align: left;
      background: rgba(94,155,87,.10); border: 1px solid rgba(94,155,87,.30); border-radius: 13px;
      padding: 9px 14px; margin: 0 auto 4px; font-size: 13.5px; line-height: 1.4; color: var(--ink);
    }
    .locate svg { width: 18px; height: 18px; flex: none; color: var(--leaf-deep); margin-top: 1px; }
    .locate b { font-weight: 700; }
    .locate .sub { color: var(--muted); }

    .footer { margin-top: 7px; font-size: 13.5px; line-height: 1.6; color: var(--muted); }
    .footer strong { color: var(--ink); font-weight: 600; }

    /* ---------- MOTION (only if the user allows it) ---------- */
    @media (prefers-reduced-motion: no-preference) {
      .anim { opacity: 0; transform: translateY(14px); animation: rise .6s cubic-bezier(.2,.7,.3,1) forwards; }
      .d1{animation-delay:.04s}.d2{animation-delay:.11s}.d3{animation-delay:.18s}
      .d4{animation-delay:.25s}.d5{animation-delay:.32s}.d6{animation-delay:.39s}
      .d7{animation-delay:.46s}.d8{animation-delay:.53s}.d9{animation-delay:.60s}
      @keyframes rise { to { opacity: 1; transform: none; } }

      .dot { animation: pulse 2.4s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:.55} }

      .btn-sms::before { animation: sheen 4.5s ease-in-out 1.2s infinite; }
      @keyframes sheen { 0%{left:-60%} 22%{left:130%} 100%{left:130%} }
    }
  </style>
</head>

    <div id="offer-wrap"></div>

    <p class="footer anim d9">
      <strong>Paradise Orchard LLC</strong> · Vail, CO<br />
      <span id="footer-contact"></span>
    </p>
  </main>

  <script>
    (function () {
      var C = CONFIG;
      var enc = encodeURIComponent(C.message);
      var ua = navigator.userAgent || "";
      var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                  (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1); // iPadOS
      // SMS body separator differs: iOS uses "&body=", Android/others use "?body="
      var smsHref  = "sms:+" + C.phone + (isIOS ? "&body=" : "?body=") + enc;
      var telHref  = "tel:+" + C.phone;
      var mailHref = "mailto:" + C.email + "?subject=" + encodeURIComponent(C.emailSubject) + "&body=" + enc;

      function resolve(t){ return t==="sms"?smsHref : t==="call"?telHref : t==="email"?mailHref : t; }
      if (C.autoRedirect) { window.location.href = resolve(C.autoRedirect); return; }

      // prices (grade x pickup/delivery) + pickup stand
      if (C.offer) {
        var pin = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>';

        var rows = "";
        (C.grades || []).forEach(function (g) {
          rows +=
            '<div class="menu-row">' +
              '<span class="grade"><b>' + g.name + '</b><em>' + g.note + '</em></span>' +
              '<span class="price">' + g.lb + '</span>' +
              '<span class="price">' + g.box + '<i>box · ' + g.weight + '</i></span>' +
            '</div>';
        });
        var head =
          '<div class="menu-row menu-head"><span>Grade</span>' +
          '<span class="price">Pickup / lb</span><span class="price">Delivery</span></div>';

        var locate = C.pickup ?
          '<div class="locate anim d9">' + pin +
            '<span><b>' + C.pickup.address + '</b> — ' + C.pickup.landmark +
            '<br><span class="sub">' + C.pickup.hours + '</span></span></div>' : '';

        document.getElementById("offer-wrap").innerHTML =
          '<div class="menu anim d9">' + head + rows + '</div>' + locate;
      }

      var ICON = {
        sms:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.38 8.38 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/></svg>',
        call:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',
        email: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>'
      };
      var defs = [
        { on: C.show.sms,   href: smsHref,  cls: "btn-sms",   ico: ICON.sms,   label: "Text us (SMS)" },
        { on: C.show.call,  href: telHref,  cls: "btn-call",  ico: ICON.call,  label: "Call us" },
        { on: C.show.email, href: mailHref, cls: "btn-email", ico: ICON.email, label: "Email us" }
      ];
      var html = "", d = 7;
      defs.forEach(function (b) {
        if (!b.on) return;
        html += '<a class="btn ' + b.cls + ' anim d' + (d++) + '" href="' + b.href + '">' +
                b.ico + '<span>' + b.label + '</span></a>';
      });
      document.getElementById("buttons").innerHTML = html;
      document.getElementById("footer-contact").textContent = C.phoneDisplay;
    })();
  </script>
</body>
</html>
